# ============================================================
# Orbit Wars — 搜索增强训练配置文件
# ============================================================

# ----- 通用训练参数 -----
seed: 42
run_name: orbit_wars_ppo
device: auto                    # auto=cuda优先, cpu强制CPU
save_dir: artifacts             # 模型保存根目录
checkpoint_every: 50            # 每50次迭代保存（通用，train_search用自身的checkpoint_every）
log_every: 1
eval_every: 50
eval_games: 20
eval_seed: 42
opponent: mixed                 # 对手类型: mixed/random/baseline/self
baseline_dir: baselines         # 基线策略文件目录
baseline_train_filter: nearest_planet_sniper  # 训练时使用的基线策略名（逗号分隔）
mixed_self_weight: 0.7          # self-play 对手权重
mixed_baseline_weight: 0.15     # 基线策略对手权重
mixed_random_weight: 0.15       # 随机对手权重
self_play_update_interval: 50
self_play_deterministic: false
alternate_player_sides: true    # 交替玩家先后手

# ----- 训练参数 (expert iteration with search) -----
train_search:
  iterations: 20                # 专家迭代总次数
  games_per_iter: 16            # 每次迭代收集数据的对局数
  epochs: 5                     # 每次迭代中监督训练轮数
  batch_size: 128               # 训练 batch size
  replay_buffer_size: 10000     # 经验回放缓冲区上限（FIFO，超出后丢弃旧数据）
  lr: 0.0001                    # 学习率
  checkpoint_every: 5           # 每N次迭代保存一次模型

# ----- 环境参数 -----
env:
  sun_radius: 10.0
  ship_speed: 6.0
  comet_speed: 4.0
  candidate_count: 8            # 每源星球考虑的候选目标数量（含noop）
  ship_bucket_count: 4          # 每候选目标考虑的舰船档位数
  max_source_planets: 12        # 最多考虑多少个源星球
  min_attack_ships: 0
  future_horizon: 32
  local_radius: 20.0
  support_k: 3

# ----- 搜索参数 (SearchAgent) -----
search:
  top_k_targets: 3              # 每源星球选取 top-K 候选目标
  ship_options: 2               # 每候选目标考虑几个舰船数量选项
  simulation_horizon: 15        # 动作评估时的未来推演步数
  greedy_sequential: true       # true=顺序贪心, false=beam search
  beam_width: 5                 # beam search 宽度
  reward_discount: 0.97         # 推演中的奖励折扣
  heuristic_weight: 0.5        # 启发式评分相对价值网络评分的权重
